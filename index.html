<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Blast</title>
  <style>
    :root {
      --green: #00ff66;
      --dark-green: #007a33;
      --red: #ff3b3b;
      --yellow: #ffd447;
      --bg: #020403;
      --panel: rgba(0, 30, 12, 0.88);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at center, #062010 0%, #020403 55%, #000 100%);
      color: var(--green);
      font-family: Consolas, Monaco, monospace;
      overflow: hidden;
      height: 100vh;
      user-select: none;
    }

    #game {
      position: relative;
      width: min(900px, 100vw);
      height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      border-left: 1px solid rgba(0,255,102,0.15);
      border-right: 1px solid rgba(0,255,102,0.15);
    }

    #hud {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(900px, 100vw);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0));
      z-index: 5;
      font-size: 18px;
      pointer-events: none;
    }

    .hud-group {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    #score {
      font-size: 34px;
      color: #00ff66;
      text-shadow: 0 0 12px rgba(0,255,102,0.9), 0 0 25px rgba(0,255,102,0.6);
    }

    #scoreLabel {
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    #inputBar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 320px;
      max-width: 90vw;
      text-align: center;
      font-size: 30px;
      color: var(--green);
      border: 1px solid var(--dark-green);
      background: rgba(0, 0, 0, 0.72);
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: 0 0 18px rgba(0, 255, 102, 0.15);
      z-index: 6;
    }

    #inputText.empty {
      opacity: 0.45;
    }

    .enemy {
      position: absolute;
      font-size: 24px;
      padding: 4px 8px;
      border: 1px solid rgba(0, 255, 102, 0.4);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.58);
      text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
      box-shadow: 0 0 14px rgba(0, 255, 102, 0.12);
      white-space: nowrap;
    }

    .enemy.targeted {
      color: var(--yellow);
      border-color: var(--yellow);
      text-shadow: 0 0 12px rgba(255, 212, 71, 0.8);
    }

    .enemy.danger {
      color: var(--red);
      border-color: var(--red);
      text-shadow: 0 0 12px rgba(255, 59, 59, 0.8);
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.78);
      z-index: 20;
      padding: 24px;
    }

    .screen.active {
      display: flex;
    }

    .panel {
      width: min(620px, 94vw);
      background: var(--panel);
      border: 1px solid var(--green);
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 0 35px rgba(0, 255, 102, 0.18);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 44px;
      letter-spacing: 2px;
    }

    h2 {
      margin-top: 0;
      font-size: 32px;
    }

    p {
      line-height: 1.5;
      color: #b9ffd2;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 18px;
      color: #001f0c;
      background: var(--green);
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-weight: 700;
    }

    button.secondary {
      color: var(--green);
      background: transparent;
      border: 1px solid var(--green);
    }

    button:hover {
      filter: brightness(1.15);
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
      text-align: left;
    }

    .settings.single-setting {
      grid-template-columns: minmax(220px, 320px);
      justify-content: center;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #b9ffd2;
      font-size: 14px;
    }

    select {
      font-family: inherit;
      font-size: 16px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid var(--dark-green);
      color: var(--green);
      background: #001507;
    }

    #waveBanner {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      opacity: 0;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(0, 255, 102, 0.8);
      transition: opacity 0.35s ease;
    }

    #deadline {
      position: absolute;
      bottom: 55px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, #ff3b3b, transparent);
      box-shadow: 0 0 12px rgba(255, 59, 59, 0.8);
      pointer-events: none;
      z-index: 2;
    }

    #waveBanner.show {
      opacity: 1;
    }

    .small {
      font-size: 14px;
      opacity: 0.82;
    }

    @media (max-width: 560px) {
      #hud {
        font-size: 14px;
        align-items: flex-start;
      }

      .settings {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="hud">
      <div class="hud-group">
        <span><span id="scoreLabel">SCORE</span><br><strong id="score">0</strong></span>
        <span>Wave: <strong id="wave">1</strong></span>
        <span>Lives: <strong id="lives">3</strong></span>
      </div>
      <div class="hud-group">
        <span>High Score: <strong id="highScore">0</strong></span>
        <span class="small">P = Pause</span>
      </div>
    </div>

    <div id="waveBanner">Wave 1</div>

    <div id="inputBar">
      <span id="inputText" class="empty">Type numbers...</span>
          <div id="deadline"></div>
    </div>
  </div>

  <div id="menuScreen" class="screen active">
    <div class="panel">
      <h1>NUMBER BLAST</h1>
      <p>Destroy falling numbers by typing the full sequence. Good Luck!.</p>

      <div class="settings single-setting">
        <label>
          Difficulty
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
            <option value="jill">Jill Mode</option>
          </select>
        </label>
      </div>

      <div class="button-row">
        <button id="startButton">Start Game</button>
      </div>

      <p class="small">Controls: numbers to type, Backspace to correct, P to pause.</p>
      <p class="small" style="margin-top:12px; opacity:0.6;">Created by Jason</p>
    </div>
  </div>

  <div id="pauseScreen" class="screen">
    <div class="panel">
      <h2>Paused</h2>
      <p>No shame in pausing. Shame is not coming back.</p>
      <div class="button-row">
        <button id="resumeButton">Resume</button>
        <button id="quitButton" class="secondary">Quit to Menu</button>
      </div>
    </div>
  </div>

  <div id="gameOverScreen" class="screen">
    <div class="panel">
      <h2>Game Over</h2>
      <p id="finalStats"></p>
      <div class="button-row">
        <button id="restartButton">Play Again</button>
        <button id="menuButton" class="secondary">Main Menu</button>
      </div>
    </div>
  </div>

  <script>
    const game = document.getElementById("game");
    const scoreEl = document.getElementById("score");
    const waveEl = document.getElementById("wave");
    const livesEl = document.getElementById("lives");
    const highScoreEl = document.getElementById("highScore");
    const inputTextEl = document.getElementById("inputText");
    const waveBannerEl = document.getElementById("waveBanner");

    const menuScreen = document.getElementById("menuScreen");
    const pauseScreen = document.getElementById("pauseScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const finalStatsEl = document.getElementById("finalStats");

    const difficultyEl = document.getElementById("difficulty");
    

    const difficultySettings = {
      easy: {
        baseSpeed: 0.35,
        spawnInterval: 1800,
        speedPerWave: 0.08,
        spawnReductionPerWave: 70,
        minSpawnInterval: 650
      },
      normal: {
        baseSpeed: 0.5,
        spawnInterval: 1500,
        speedPerWave: 0.12,
        spawnReductionPerWave: 90,
        minSpawnInterval: 500
      },
      hard: {
        baseSpeed: 0.7,
        spawnInterval: 1150,
        speedPerWave: 0.17,
        spawnReductionPerWave: 110,
        minSpawnInterval: 380
      },
      jill: {
        baseSpeed: 1.1,
        spawnInterval: 800,
        speedPerWave: 0.25,
        spawnReductionPerWave: 130,
        minSpawnInterval: 220
      }
    };

    let enemies = [];
    let input = "";
    let score = 0;
    let wave = 1;
    let lives = 3;
    let destroyedThisWave = 0;
    let enemiesNeededForNextWave = 8;
    let speed = 0.5;
    let spawnInterval = 1500;
    let spawnTimer = null;
    let animationId = null;
    let gameState = "menu";
    let settings = difficultySettings.normal;

    let highScore = Number(localStorage.getItem("numberZTypeHighScore") || 0);
    highScoreEl.textContent = highScore;

    function randomNumberString() {
      // Numbers get longer as waves increase.
      const minLength = Math.min(3 + Math.floor((wave - 1) / 3), 7);
      const maxExtra = Math.min(2 + Math.floor(wave / 4), 5);
      const length = minLength + Math.floor(Math.random() * maxExtra);

      let value = "";
      for (let i = 0; i < length; i++) {
        value += Math.floor(Math.random() * 10);
      }
      return value;
    }

    function spawnEnemy() {
      if (gameState !== "playing") return;

      const el = document.createElement("div");
      el.className = "enemy";
      el.textContent = randomNumberString();

      const safeTopGap = 60;
      const gameRect = game.getBoundingClientRect();
      const maxLeft = Math.max(gameRect.width - 140, 20);

      el.style.left = Math.random() * maxLeft + "px";
      el.style.top = safeTopGap + "px";

      game.appendChild(el);

      enemies.push({
        el,
        text: el.textContent,
        y: safeTopGap,
        speedMultiplier: 0.85 + Math.random() * 0.35
      });
    }

    function updateHud() {
      scoreEl.textContent = score;
      waveEl.textContent = wave;
      livesEl.textContent = lives;
      highScoreEl.textContent = highScore;

      inputTextEl.textContent = input || "Type numbers...";
      inputTextEl.classList.toggle("empty", input.length === 0);
    }

    function updateEnemyStyles() {
      enemies.forEach(enemy => {
        enemy.el.classList.toggle("targeted", input.length > 0 && enemy.text.startsWith(input));
        enemy.el.classList.toggle("danger", enemy.y > window.innerHeight * 0.72);
      });
    }

    function checkInputMatch() {
      const matchIndex = enemies.findIndex(enemy => enemy.text === input);

      if (matchIndex === -1) return;

      const enemy = enemies[matchIndex];
      const points = enemy.text.length * 10 + wave * 5;

      score += points;
      destroyedThisWave++;

      enemy.el.remove();
      enemies.splice(matchIndex, 1);
      input = "";

      if (score > highScore) {
        highScore = score;
        localStorage.setItem("numberZTypeHighScore", String(highScore));
      }

      if (destroyedThisWave >= enemiesNeededForNextWave) {
        nextWave();
      }
    }

    function nextWave() {
      wave++;
      destroyedThisWave = 0;
      enemiesNeededForNextWave = 8 + wave * 2;
      speed = settings.baseSpeed + (wave - 1) * settings.speedPerWave;
      spawnInterval = Math.max(
        settings.minSpawnInterval,
        settings.spawnInterval - (wave - 1) * settings.spawnReductionPerWave
      );

      resetSpawnTimer();
      showWaveBanner();
    }

    function showWaveBanner() {
      waveBannerEl.textContent = `Wave ${wave}`;
      waveBannerEl.classList.add("show");

      setTimeout(() => {
        waveBannerEl.classList.remove("show");
      }, 900);
    }

    function loseLife(enemyIndex) {
      const enemy = enemies[enemyIndex];
      enemy.el.remove();
      enemies.splice(enemyIndex, 1);

      lives--;
      input = "";

      if (lives <= 0) {
        endGame();
      }
    }

    function update() {
      if (gameState !== "playing") return;

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.y += speed * enemy.speedMultiplier;
        enemy.el.style.top = enemy.y + "px";

        if (enemy.y > window.innerHeight - 55) {
          loseLife(i);
        }
      }

      checkInputMatch();
      updateEnemyStyles();
      updateHud();

      animationId = requestAnimationFrame(update);
    }

    function resetSpawnTimer() {
      clearInterval(spawnTimer);
      spawnTimer = setInterval(spawnEnemy, spawnInterval);
    }

    function clearEnemies() {
      enemies.forEach(enemy => enemy.el.remove());
      enemies = [];
    }

    function startGame() {
      settings = difficultySettings[difficultyEl.value];
      lives = 3;
      score = 0;
      wave = 1;
      input = "";
      destroyedThisWave = 0;
      enemiesNeededForNextWave = 8;
      speed = settings.baseSpeed;
      spawnInterval = settings.spawnInterval;
      gameState = "playing";

      clearEnemies();
      hideAllScreens();
      updateHud();
      showWaveBanner();
      resetSpawnTimer();
      spawnEnemy();

      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(update);
    }

    function pauseGame() {
      if (gameState !== "playing") return;
      gameState = "paused";
      clearInterval(spawnTimer);
      cancelAnimationFrame(animationId);
      pauseScreen.classList.add("active");
    }

    function resumeGame() {
      if (gameState !== "paused") return;
      gameState = "playing";
      pauseScreen.classList.remove("active");
      resetSpawnTimer();
      animationId = requestAnimationFrame(update);
    }

    function endGame() {
      gameState = "gameover";
      clearInterval(spawnTimer);
      cancelAnimationFrame(animationId);
      clearEnemies();

      finalStatsEl.innerHTML = `Final Score: <strong>${score}</strong><br>Wave Reached: <strong>${wave}</strong><br>High Score: <strong>${highScore}</strong>`;
      gameOverScreen.classList.add("active");
      updateHud();
    }

    function quitToMenu() {
      gameState = "menu";
      clearInterval(spawnTimer);
      cancelAnimationFrame(animationId);
      clearEnemies();
      input = "";
      hideAllScreens();
      menuScreen.classList.add("active");
      updateHud();
    }

    function hideAllScreens() {
      menuScreen.classList.remove("active");
      pauseScreen.classList.remove("active");
      gameOverScreen.classList.remove("active");
    }

    document.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() === "p") {
        if (gameState === "playing") pauseGame();
        else if (gameState === "paused") resumeGame();
        return;
      }

      if (gameState !== "playing") return;

      if (event.key >= "0" && event.key <= "9") {
        input += event.key;
      } else if (event.key === "Backspace") {
        event.preventDefault();
        input = input.slice(0, -1);
      } else if (event.key === "Enter" || event.key === "Escape") {
        input = "";
      }

      checkInputMatch();
      updateEnemyStyles();
      updateHud();
    });

    document.getElementById("startButton").addEventListener("click", startGame);
    document.getElementById("resumeButton").addEventListener("click", resumeGame);
    document.getElementById("quitButton").addEventListener("click", quitToMenu);
    document.getElementById("restartButton").addEventListener("click", startGame);
    document.getElementById("menuButton").addEventListener("click", quitToMenu);

    updateHud();
  </script>
</body>
</html>
